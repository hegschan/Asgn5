<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>CSE160 Assignment 5 — Three.js World</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #000;
        font-family: system-ui, sans-serif;
      }

      #info {
        position: absolute;
        top: 12px;
        left: 12px;
        padding: 10px 14px;
        color: #eef6ff;
        background: rgba(8, 16, 32, 0.72);
        border: 1px solid rgba(120, 180, 255, 0.35);
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.45;
        pointer-events: none;
        user-select: none;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
      }
    }
    </script>
  </head>
  <body>
    <div id="info">
      <strong>Crystal Garden</strong><br>
      Drag to orbit · Scroll to zoom · Right-drag to pan
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
